<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ClawChat</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ClawChat" />
    <meta name="theme-color" content="#0c8cff" />
    <script>
      // Fix iOS 100vh: set --vh to actual viewport height (without keyboard adjustment)
      function setVh(){
        document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
      }
      setVh();
      window.addEventListener('resize', setVh);
    </script>
  </head>
  <body class="bg-dark-bg text-dark-text">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
